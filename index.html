<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FlowTask</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --surface2: #1a1e28;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.12);
      --accent: #6ee7b7;
      --accent2: #38bdf8;
      --accent3: #f472b6;
      --text: #e8edf5;
      --text-muted: #6b7a96;
      --text-dim: #3d4a60;
      --danger: #ff6b6b;
      --success: #6ee7b7;
      --glow: rgba(110, 231, 183, 0.15);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* animated bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(110,231,183,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 80%, rgba(56,189,248,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(244,114,182,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    /* HEADER */
    .header {
      margin-bottom: 1.5rem;
      padding: 0 0.5rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.4rem;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: #0d0f14;
      box-shadow: 0 0 20px rgba(110,231,183,0.3);
      flex-shrink: 0;
    }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .brand-dot {
      color: var(--accent);
    }

    .header-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      padding-left: 0.2rem;
      letter-spacing: 0.5px;
    }

    /* STATS ROW */
    .stats-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .stat-chip {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 0.75rem 1rem;
      text-align: center;
      transition: 0.2s;
    }

    .stat-chip:hover {
      border-color: var(--border-hover);
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .stat-num.accent { color: var(--accent); }
    .stat-num.blue { color: var(--accent2); }
    .stat-num.pink { color: var(--accent3); }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    /* PROGRESS BAR */
    .progress-bar-wrap {
      height: 4px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 8px rgba(110,231,183,0.5);
    }

    /* MAIN CARD */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1.75rem;
      overflow: hidden;
    }

    /* ADD TASK */
    .add-section {
      padding: 1.5rem 1.5rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .add-row {
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    .input-wrap i {
      position: absolute;
      left: 1.1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 0.9rem;
      transition: color 0.2s;
      pointer-events: none;
    }

    #taskInput {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 0.85rem 1rem 0.85rem 2.6rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: 0.2s;
    }

    #taskInput::placeholder { color: var(--text-dim); }

    #taskInput:focus {
      border-color: rgba(110,231,183,0.35);
      box-shadow: 0 0 0 3px rgba(110,231,183,0.08);
      background: #1e2231;
    }

    #taskInput:focus + i,
    .input-wrap:focus-within i { color: var(--accent); }

    .btn-add {
      background: linear-gradient(135deg, var(--accent), #34d399);
      border: none;
      border-radius: 1rem;
      padding: 0.85rem 1.4rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: #071a12;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
      transition: 0.2s;
      box-shadow: 0 4px 15px rgba(110,231,183,0.25);
      letter-spacing: 0.3px;
    }

    .btn-add:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(110,231,183,0.35);
    }

    .btn-add:active { transform: scale(0.97); }

    /* PRIORITY PICKER */
    .priority-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.9rem;
      align-items: center;
    }

    .priority-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-right: 0.2rem;
    }

    .priority-chip {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      padding: 0.3rem 0.8rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: 0.15s;
    }

    .priority-chip[data-p="low"].sel   { background: rgba(110,231,183,0.12); border-color: var(--accent); color: var(--accent); }
    .priority-chip[data-p="med"].sel   { background: rgba(251,191,36,0.12);  border-color: #fbbf24; color: #fbbf24; }
    .priority-chip[data-p="high"].sel  { background: rgba(255,107,107,0.12); border-color: var(--danger); color: var(--danger); }

    /* FILTER BAR */
    .filter-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.5rem;
      border-bottom: 1px solid var(--border);
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .filter-tabs {
      display: flex;
      background: var(--surface2);
      border-radius: 0.75rem;
      padding: 0.2rem;
      gap: 0.2rem;
    }

    .filter-btn {
      background: transparent;
      border: none;
      border-radius: 0.5rem;
      padding: 0.4rem 0.9rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: 0.15s;
    }

    .filter-btn.active {
      background: var(--surface);
      color: var(--text);
      font-weight: 600;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    .sort-clear {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-sm {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      padding: 0.38rem 0.8rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .btn-sm:hover { border-color: var(--danger); color: var(--danger); background: rgba(255,107,107,0.06); }

    /* TASKS LIST */
    .tasks-wrap {
      padding: 1rem 1.2rem 1.2rem;
      max-height: 440px;
      overflow-y: auto;
    }

    .tasks-wrap::-webkit-scrollbar { width: 4px; }
    .tasks-wrap::-webkit-scrollbar-track { background: transparent; }
    .tasks-wrap::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 99px; }

    .task-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }

    /* TASK ITEM */
    .task-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 0.75rem 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
      position: relative;
      overflow: hidden;
      animation: slideIn 0.25s cubic-bezier(0.4,0,0.2,1) both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      border-radius: 0 3px 3px 0;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .task-item[data-p="high"]::before { background: var(--danger); }
    .task-item[data-p="med"]::before  { background: #fbbf24; }
    .task-item[data-p="low"]::before  { background: var(--accent); }

    .task-item:hover {
      border-color: var(--border-hover);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    .task-item:hover::before { opacity: 1; }

    .task-item.done {
      opacity: 0.55;
      background: rgba(110,231,183,0.03);
    }

    .task-item.done .check-custom {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(110,231,183,0.35);
    }

    .task-item.done .check-custom i {
      opacity: 1;
      transform: scale(1);
    }

    /* custom checkbox */
    .check-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .check-wrap input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    .check-custom {
      width: 22px;
      height: 22px;
      border: 1.5px solid var(--text-dim);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
      background: transparent;
      flex-shrink: 0;
    }

    .check-custom:hover {
      border-color: var(--accent);
      background: rgba(110,231,183,0.08);
    }

    .check-custom.checked {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(110,231,183,0.35);
    }

    .check-custom i {
      font-size: 0.65rem;
      color: #071a12;
      opacity: 0;
      transform: scale(0);
      transition: all 0.18s cubic-bezier(0.4,0,0.2,1);
    }

    .check-custom.checked i {
      opacity: 1;
      transform: scale(1);
    }

    .task-body {
      flex: 1;
      min-width: 0;
    }

    .task-text {
      font-size: 0.92rem;
      font-weight: 400;
      color: var(--text);
      word-break: break-word;
      line-height: 1.4;
      transition: 0.2s;
      cursor: text;
    }

    .task-text.done-text {
      text-decoration: line-through;
      color: var(--text-dim);
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.25rem;
    }

    .task-date {
      font-size: 0.68rem;
      color: var(--text-dim);
    }

    .task-badge {
      font-size: 0.62rem;
      padding: 0.12rem 0.45rem;
      border-radius: 0.4rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .badge-low  { background: rgba(110,231,183,0.1); color: var(--accent); }
    .badge-med  { background: rgba(251,191,36,0.1);  color: #fbbf24; }
    .badge-high { background: rgba(255,107,107,0.1); color: var(--danger); }

    /* inline edit */
    .edit-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--accent);
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      color: var(--text);
      padding: 0.1rem 0;
    }

    /* action buttons */
    .task-actions {
      display: flex;
      gap: 0.25rem;
      opacity: 0;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    .task-item:hover .task-actions { opacity: 1; }

    .icon-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 7px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      cursor: pointer;
      transition: 0.15s;
      color: var(--text-muted);
    }

    .icon-btn:hover { background: var(--surface); }
    .icon-btn.edit:hover  { color: var(--accent2); }
    .icon-btn.del:hover   { color: var(--danger); }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--text-dim);
    }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      opacity: 0.3;
    }

    .empty-state h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }

    .empty-state p {
      font-size: 0.8rem;
    }

    /* FOOTER */
    .footer {
      padding: 0.85rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .footer-hint {
      font-size: 0.7rem;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .kbd {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    /* TOAST */
    .toast-wrap {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
    }

    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 0.8rem;
      padding: 0.6rem 1rem;
      font-size: 0.8rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      animation: toastIn 0.3s ease both;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .toast i { color: var(--accent); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes toastOut {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(20px); }
    }

    .save-indicator {
      transition: color 0.3s;
    }
    .save-indicator.saved {
      color: var(--accent);
    }

    /* MOBILE */
    @media (max-width: 500px) {
      .stats-row { gap: 0.5rem; }
      .add-row { flex-wrap: wrap; }
      .btn-add { width: 100%; justify-content: center; }
      .task-actions { opacity: 1; }
    }
  </style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="brand">
      <div class="brand-icon"><i class="fas fa-bolt"></i></div>
      <div class="brand-name">Flow<span class="brand-dot">.</span></div>
    </div>
    <div class="header-sub">Stay focused. Get it done.</div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-chip">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-chip">
      <div class="stat-num blue" id="statActive">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat-chip">
      <div class="stat-num accent" id="statDone">0</div>
      <div class="stat-label">Done</div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
  </div>

  <!-- MAIN CARD -->
  <div class="card">

    <!-- ADD -->
    <div class="add-section">
      <div class="add-row">
        <div class="input-wrap">
          <input type="text" id="taskInput" placeholder="What needs to be done?" autocomplete="off">
          <i class="fas fa-plus"></i>
        </div>
        <button class="btn-add" id="addBtn">
          <i class="fas fa-arrow-up"></i> Add
        </button>
      </div>
      <div class="priority-row">
        <span class="priority-label">Priority:</span>
        <button class="priority-chip sel" data-p="low">Low</button>
        <button class="priority-chip" data-p="med">Med</button>
        <button class="priority-chip" data-p="high">High</button>
      </div>
    </div>

    <!-- FILTER -->
    <div class="filter-bar">
      <div class="filter-tabs">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="done">Done</button>
      </div>
      <div class="sort-clear">
        <button class="btn-sm" id="sortBtn"><i class="fas fa-arrow-up-wide-short"></i> Sort</button>
        <button class="btn-sm" id="clearBtn"><i class="fas fa-trash"></i> Clear done</button>
      </div>
    </div>

    <!-- TASKS -->
    <div class="tasks-wrap">
      <ul class="task-list" id="taskList"></ul>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <span class="footer-hint"><i class="fas fa-database"></i> <span id="saveIndicator" class="save-indicator">Auto-saved</span></span>
      <span class="footer-hint">
        <kbd class="kbd">↵</kbd> Add &nbsp;
        <kbd class="kbd">Dbl-click</kbd> Edit &nbsp;
        <kbd class="kbd">Esc</kbd> Cancel
      </span>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
(function() {
  /* ─── STATE ─── */
  let tasks = [];
  let filter = 'all';
  let priority = 'low';
  let sortMode = 'date'; // 'date' | 'priority'

  const PRIORITY_ORDER = { high: 0, med: 1, low: 2 };

  /* ─── DOM ─── */
  const taskInput = document.getElementById('taskInput');
  const addBtn    = document.getElementById('addBtn');
  const taskList  = document.getElementById('taskList');
  const clearBtn  = document.getElementById('clearBtn');
  const sortBtn   = document.getElementById('sortBtn');
  const toastWrap = document.getElementById('toastWrap');

  const statTotal  = document.getElementById('statTotal');
  const statActive = document.getElementById('statActive');
  const statDone   = document.getElementById('statDone');
  const progressBar = document.getElementById('progressBar');

  /* ─── STORAGE ─── */
  // In-memory fallback if localStorage is blocked (e.g. file:// in some browsers)
  let memStore = null;

  function storageAvailable() {
    try { localStorage.setItem('__test__', '1'); localStorage.removeItem('__test__'); return true; }
    catch(e) { return false; }
  }

  const useLocal = storageAvailable();

  function load() {
    try {
      const raw = useLocal ? localStorage.getItem('flowtask_v2') : memStore;
      if (raw) tasks = JSON.parse(raw);
      if (!Array.isArray(tasks)) tasks = [];
    } catch(e) { tasks = []; }
    if (tasks.length === 0) {
      tasks = [
        { id: uid(), text: 'Review project proposal', done: false, priority: 'high', date: Date.now() - 2000 },
        { id: uid(), text: 'Update design system components', done: true,  priority: 'med', date: Date.now() - 1000 },
        { id: uid(), text: 'Team sync at 3pm', done: false, priority: 'low', date: Date.now() },
      ];
    }
  }

  function save() {
    try {
      const data = JSON.stringify(tasks);
      if (useLocal) {
        localStorage.setItem('flowtask_v2', data);
      } else {
        memStore = data; // session-only fallback
      }
      flashSaveIndicator();
    } catch(e) { console.warn('Save failed:', e); }
  }

  function flashSaveIndicator() {
    const el = document.getElementById('saveIndicator');
    if (!el) return;
    el.classList.add('saved');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('saved'), 1500);
  }

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

  /* ─── TOAST ─── */
  function toast(msg, icon = 'fa-check') {
    const el = document.createElement('div');
    el.className = 'toast';
    el.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
    toastWrap.appendChild(el);
    setTimeout(() => {
      el.style.animation = 'toastOut 0.3s ease both';
      setTimeout(() => el.remove(), 300);
    }, 2000);
  }

  /* ─── STATS ─── */
  function updateStats() {
    const total = tasks.length;
    const done  = tasks.filter(t => t.done).length;
    const active = total - done;
    statTotal.textContent  = total;
    statActive.textContent = active;
    statDone.textContent   = done;
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);
    progressBar.style.width = pct + '%';
  }

  /* ─── RENDER ─── */
  function filtered() {
    let list = [...tasks];
    if (filter === 'active') list = list.filter(t => !t.done);
    if (filter === 'done')   list = list.filter(t =>  t.done);
    if (sortMode === 'priority') {
      list.sort((a,b) => (PRIORITY_ORDER[a.priority]||2) - (PRIORITY_ORDER[b.priority]||2));
    } else {
      list.sort((a,b) => b.date - a.date);
    }
    return list;
  }

  function render() {
    const list = filtered();
    taskList.innerHTML = '';
    if (list.length === 0) {
      taskList.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon"><i class="fas fa-inbox"></i></div>
          <h3>${filter === 'done' ? 'Nothing completed yet' : filter === 'active' ? 'All done! 🎉' : 'No tasks yet'}</h3>
          <p>${filter === 'all' ? 'Add your first task above' : ''}</p>
        </div>`;
      updateStats();
      return;
    }
    list.forEach(task => taskList.appendChild(makeItem(task)));
    updateStats();
  }

  function makeItem(task) {
    const li = document.createElement('li');
    li.className = 'task-item' + (task.done ? ' done' : '');
    li.dataset.id = task.id;
    li.dataset.p  = task.priority;

    // date fmt
    const d = new Date(task.date);
    const dateStr = d.toLocaleDateString('en', { month:'short', day:'numeric' });

    li.innerHTML = `
      <div class="check-wrap">
        <div class="check-custom${task.done ? ' checked' : ''}"><i class="fas fa-check"></i></div>
      </div>
      <div class="task-body">
        <div class="task-text${task.done ? ' done-text' : ''}">${escHtml(task.text)}</div>
        <div class="task-meta">
          <span class="task-date">${dateStr}</span>
          <span class="task-badge badge-${task.priority}">${task.priority}</span>
        </div>
      </div>
      <div class="task-actions">
        <button class="icon-btn edit" title="Edit"><i class="fas fa-pen"></i></button>
        <button class="icon-btn del"  title="Delete"><i class="fas fa-trash"></i></button>
      </div>`;

    // checkbox click
    li.querySelector('.check-custom').addEventListener('click', () => {
      const t = findTask(task.id);
      if (t) { t.done = !t.done; save(); render(); toast(t.done ? 'Task completed! \u2713' : 'Marked active', t.done ? 'fa-check' : 'fa-rotate-left'); }
    });

    // double-click to edit
    li.querySelector('.task-text').addEventListener('dblclick', () => startEdit(li, task.id));

    // edit btn
    li.querySelector('.edit').addEventListener('click', () => startEdit(li, task.id));

    // delete btn
    li.querySelector('.del').addEventListener('click', () => {
      tasks = tasks.filter(t => t.id !== task.id);
      save(); render(); toast('Task deleted', 'fa-trash');
    });

    return li;
  }

  function startEdit(li, id) {
    const t = findTask(id);
    if (!t) return;
    const textEl = li.querySelector('.task-text');
    const orig = t.text;

    const inp = document.createElement('input');
    inp.className = 'edit-input';
    inp.value = orig;
    textEl.replaceWith(inp);
    inp.focus();

    const commit = () => {
      const val = inp.value.trim();
      if (val) { t.text = val.slice(0,120); save(); }
      render();
    };

    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') inp.blur();
      if (e.key === 'Escape') { t.text = orig; render(); }
    });
  }

  /* ─── ADD TASK ─── */
  function addTask() {
    const text = taskInput.value.trim();
    if (!text) {
      taskInput.style.borderColor = 'rgba(255,107,107,0.5)';
      taskInput.focus();
      setTimeout(() => taskInput.style.borderColor = '', 1000);
      return;
    }
    tasks.unshift({ id: uid(), text: text.slice(0,120), done: false, priority, date: Date.now() });
    save();
    taskInput.value = '';
    taskInput.focus();
    if (filter === 'done') setFilter('all');
    render();
    toast('Task added!', 'fa-plus');
  }

  /* ─── PRIORITY ─── */
  document.querySelectorAll('.priority-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.priority-chip').forEach(b => b.classList.remove('sel'));
      btn.classList.add('sel');
      priority = btn.dataset.p;
    });
  });

  /* ─── FILTER ─── */
  function setFilter(f) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
    render();
  }

  document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => setFilter(btn.dataset.filter)));

  /* ─── SORT ─── */
  sortBtn.addEventListener('click', () => {
    sortMode = sortMode === 'date' ? 'priority' : 'date';
    sortBtn.innerHTML = `<i class="fas fa-arrow-up-wide-short"></i> ${sortMode === 'priority' ? 'By priority' : 'By date'}`;
    render();
  });

  /* ─── CLEAR DONE ─── */
  clearBtn.addEventListener('click', () => {
    const count = tasks.filter(t => t.done).length;
    if (!count) return;
    tasks = tasks.filter(t => !t.done);
    save(); render(); toast(`${count} task${count > 1 ? 's' : ''} cleared`, 'fa-trash');
  });

  /* ─── EVENTS ─── */
  addBtn.addEventListener('click', addTask);
  taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  /* ─── UTILS ─── */
  function findTask(id) { return tasks.find(t => t.id === id); }
  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  /* ─── INIT ─── */
  load();
  render();
})();
</script>
</body>
</html>
