<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FlowTask</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6ee7b7">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FlowTask">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --surface2: #1a1e28;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.12);
      --accent: #6ee7b7;
      --accent2: #38bdf8;
      --accent3: #f472b6;
      --text: #e8edf5;
      --text-muted: #6b7a96;
      --text-dim: #3d4a60;
      --danger: #ff6b6b;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top, 1.5rem) 1rem env(safe-area-inset-bottom, 1.5rem);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(110,231,183,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 80%, rgba(56,189,248,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(244,114,182,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    .header { margin-bottom: 1.5rem; padding: 0 0.5rem; }

    .brand { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.4rem; }

    .brand-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; color: #0d0f14;
      box-shadow: 0 0 20px rgba(110,231,183,0.3);
      flex-shrink: 0;
    }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem; font-weight: 800;
      color: var(--text); letter-spacing: -0.5px;
    }

    .brand-dot { color: var(--accent); }
    .header-sub { font-size: 0.8rem; color: var(--text-muted); padding-left: 0.2rem; letter-spacing: 0.5px; }

    /* OFFLINE BANNER */
    .offline-banner {
      display: none;
      background: rgba(255,107,107,0.1);
      border: 1px solid rgba(255,107,107,0.25);
      border-radius: 0.75rem;
      padding: 0.5rem 1rem;
      font-size: 0.78rem;
      color: var(--danger);
      text-align: center;
      margin-bottom: 1rem;
    }
    .offline-banner.show { display: block; }

    /* STATS */
    .stats-row { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }

    .stat-chip {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 0.75rem 1rem;
      text-align: center;
      transition: 0.2s;
    }

    .stat-chip:hover { border-color: var(--border-hover); }

    .stat-num { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--text); line-height: 1; }
    .stat-num.accent { color: var(--accent); }
    .stat-num.blue   { color: var(--accent2); }
    .stat-label { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 0.8px; }

    /* PROGRESS */
    .progress-bar-wrap { height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-bottom: 1.5rem; }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 8px rgba(110,231,183,0.5);
    }

    /* CARD */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 1.75rem; overflow: hidden; }

    /* ADD */
    .add-section { padding: 1.5rem 1.5rem 1.25rem; border-bottom: 1px solid var(--border); }

    .add-row { display: flex; gap: 0.6rem; align-items: center; }

    .input-wrap { flex: 1; position: relative; }

    .input-wrap i {
      position: absolute; left: 1.1rem; top: 50%; transform: translateY(-50%);
      color: var(--text-dim); font-size: 0.9rem; transition: color 0.2s; pointer-events: none;
    }

    #taskInput {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 0.85rem 1rem 0.85rem 2.6rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; color: var(--text);
      outline: none; transition: 0.2s;
    }

    #taskInput::placeholder { color: var(--text-dim); }
    #taskInput:focus { border-color: rgba(110,231,183,0.35); box-shadow: 0 0 0 3px rgba(110,231,183,0.08); background: #1e2231; }

    .btn-add {
      background: linear-gradient(135deg, var(--accent), #34d399);
      border: none; border-radius: 1rem;
      padding: 0.85rem 1.4rem;
      font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700;
      color: #071a12; cursor: pointer;
      display: flex; align-items: center; gap: 0.4rem;
      white-space: nowrap; transition: 0.2s;
      box-shadow: 0 4px 15px rgba(110,231,183,0.25);
    }

    .btn-add:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(110,231,183,0.35); }
    .btn-add:active { transform: scale(0.97); }

    /* PRIORITY */
    .priority-row { display: flex; gap: 0.5rem; margin-top: 0.9rem; align-items: center; }
    .priority-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; margin-right: 0.2rem; }

    .priority-chip {
      background: transparent; border: 1px solid var(--border); border-radius: 0.6rem;
      padding: 0.3rem 0.8rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 500;
      color: var(--text-muted); cursor: pointer; transition: 0.15s;
    }

    .priority-chip[data-p="low"].sel  { background: rgba(110,231,183,0.12); border-color: var(--accent); color: var(--accent); }
    .priority-chip[data-p="med"].sel  { background: rgba(251,191,36,0.12);  border-color: #fbbf24; color: #fbbf24; }
    .priority-chip[data-p="high"].sel { background: rgba(255,107,107,0.12); border-color: var(--danger); color: var(--danger); }

    /* FILTER */
    .filter-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.9rem 1.5rem; border-bottom: 1px solid var(--border);
      gap: 0.75rem; flex-wrap: wrap;
    }

    .filter-tabs { display: flex; background: var(--surface2); border-radius: 0.75rem; padding: 0.2rem; gap: 0.2rem; }

    .filter-btn {
      background: transparent; border: none; border-radius: 0.5rem;
      padding: 0.4rem 0.9rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500;
      color: var(--text-muted); cursor: pointer; transition: 0.15s;
    }

    .filter-btn.active { background: var(--surface); color: var(--text); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }

    .sort-clear { display: flex; align-items: center; gap: 0.5rem; }

    .btn-sm {
      background: transparent; border: 1px solid var(--border); border-radius: 0.6rem;
      padding: 0.38rem 0.8rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 500;
      color: var(--text-muted); cursor: pointer; transition: 0.2s;
      display: flex; align-items: center; gap: 0.35rem;
    }

    .btn-sm:hover { border-color: var(--danger); color: var(--danger); background: rgba(255,107,107,0.06); }

    /* TASKS */
    .tasks-wrap { padding: 1rem 1.2rem 1.2rem; max-height: 440px; overflow-y: auto; }
    .tasks-wrap::-webkit-scrollbar { width: 4px; }
    .tasks-wrap::-webkit-scrollbar-track { background: transparent; }
    .tasks-wrap::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 99px; }

    .task-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }

    .task-item {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 1rem; padding: 0.75rem 0.85rem;
      display: flex; align-items: center; gap: 0.75rem;
      transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
      position: relative; overflow: hidden;
      animation: slideIn 0.25s cubic-bezier(0.4,0,0.2,1) both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; border-radius: 0 3px 3px 0; background: var(--accent);
      opacity: 0; transition: opacity 0.2s;
    }

    .task-item[data-p="high"]::before { background: var(--danger); }
    .task-item[data-p="med"]::before  { background: #fbbf24; }
    .task-item[data-p="low"]::before  { background: var(--accent); }

    .task-item:hover { border-color: var(--border-hover); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
    .task-item:hover::before { opacity: 1; }
    .task-item.done { opacity: 0.5; }

    /* checkbox */
    .check-wrap { position: relative; flex-shrink: 0; display: flex; align-items: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .check-wrap input[type="checkbox"] { position: absolute; opacity: 0; width: 0; height: 0; }

    .check-custom {
      width: 20px; height: 20px;
      border: 1.5px solid var(--text-dim);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
      flex-shrink: 0;
      background: var(--surface);
    }

    .check-custom:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(110,231,183,0.1);
    }

    .check-wrap input:checked ~ .check-custom {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check-custom i {
      font-size: 0.65rem; color: #071a12;
      opacity: 0; transform: scale(0);
      transition: all 0.15s cubic-bezier(0.4,0,0.2,1);
    }
    .check-wrap input:checked ~ .check-custom i { opacity: 1; transform: scale(1); }

    .task-body { flex: 1; min-width: 0; }

    .task-text { font-size: 0.92rem; font-weight: 400; color: var(--text); word-break: break-word; line-height: 1.4; transition: 0.2s; cursor: text; }
    .task-text.done-text { text-decoration: line-through; color: var(--text-dim); }

    .task-meta { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.25rem; }
    .task-date { font-size: 0.65rem; color: var(--text-dim); display: inline-flex; align-items: center; gap: 0.2rem; }
    .task-date i { font-size: 0.6rem; }

    .task-badge { font-size: 0.62rem; padding: 0.12rem 0.45rem; border-radius: 0.4rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
    .badge-low  { background: rgba(110,231,183,0.1); color: var(--accent); }
    .badge-med  { background: rgba(251,191,36,0.1);  color: #fbbf24; }
    .badge-high { background: rgba(255,107,107,0.1); color: var(--danger); }

    .edit-input {
      width: 100%; background: transparent; border: none;
      border-bottom: 1px solid var(--accent); outline: none;
      font-family: 'DM Sans', sans-serif; font-size: 0.92rem; color: var(--text); padding: 0.1rem 0;
    }

    .task-actions { display: flex; gap: 0.25rem; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
    .task-item:hover .task-actions { opacity: 1; }

    .icon-btn {
      width: 28px; height: 28px; border: none; border-radius: 7px;
      background: transparent; display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; cursor: pointer; transition: 0.15s; color: var(--text-muted);
    }

    .icon-btn:hover { background: var(--surface); }
    .icon-btn.edit:hover { color: var(--accent2); }
    .icon-btn.del:hover  { color: var(--danger); }

    /* EMPTY */
    .empty-state { text-align: center; padding: 3.5rem 1rem; color: var(--text-dim); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.3; }
    .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.4rem; }
    .empty-state p { font-size: 0.8rem; }

    /* FOOTER */
    .footer { padding: 0.85rem 1.5rem; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    .footer-hint { font-size: 0.7rem; color: var(--text-dim); display: flex; align-items: center; gap: 0.4rem; }
    .kbd { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 0.1rem 0.4rem; font-size: 0.65rem; color: var(--text-muted); }

    /* INSTALL BANNER */
    .install-banner {
      display: none;
      background: var(--surface);
      border: 1px solid rgba(110,231,183,0.2);
      border-radius: 1rem;
      padding: 0.8rem 1.2rem;
      margin-bottom: 1rem;
      align-items: center;
      gap: 0.75rem;
    }

    .install-banner.show { display: flex; }

    .install-banner span { flex: 1; font-size: 0.82rem; color: var(--text-muted); }
    .install-banner span strong { color: var(--accent); }

    .btn-install {
      background: var(--accent); border: none; border-radius: 0.6rem;
      padding: 0.45rem 1rem;
      font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 700;
      color: #071a12; cursor: pointer; white-space: nowrap;
    }

    .btn-dismiss { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-size: 1rem; }

    /* NOTIFICATION PERMISSION BANNER */
    .notif-banner {
      display: none;
      background: var(--surface);
      border: 1px solid rgba(56,189,248,0.25);
      border-radius: 1rem;
      padding: 0.8rem 1.2rem;
      margin-bottom: 1rem;
      align-items: center;
      gap: 0.75rem;
    }
    .notif-banner.show { display: flex; }
    .notif-banner span { flex: 1; font-size: 0.82rem; color: var(--text-muted); }
    .notif-banner span strong { color: var(--accent2); }
    .btn-notif {
      background: var(--accent2); border: none; border-radius: 0.6rem;
      padding: 0.45rem 1rem;
      font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 700;
      color: #071a12; cursor: pointer; white-space: nowrap;
    }

    /* TOAST */
    .toast-wrap { position: fixed; bottom: 2rem; right: 1rem; z-index: 100; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }

    .toast {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 0.8rem;
      padding: 0.6rem 1rem; font-size: 0.8rem; color: var(--text);
      display: flex; align-items: center; gap: 0.5rem;
      animation: toastIn 0.3s ease both;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .toast i { color: var(--accent); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes toastOut {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(20px); }
    }

    /* DUE DATE */
    .due-row {
      display: flex; align-items: center; gap: 0.6rem;
      margin-top: 0.75rem; flex-wrap: wrap;
    }
    .due-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; }
    #dueDateInput {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 0.6rem;
      padding: 0.3rem 0.7rem; font-family: 'DM Sans', sans-serif; font-size: 0.78rem;
      color: var(--text); outline: none; cursor: pointer; transition: 0.2s; color-scheme: dark;
    }
    #dueDateInput:focus { border-color: rgba(110,231,183,0.4); }
    .btn-clear-date {
      background: transparent; border: none; font-size: 0.7rem; color: var(--text-dim);
      cursor: pointer; padding: 0.2rem 0.5rem; border-radius: 0.4rem; transition: 0.15s; font-family: 'DM Sans', sans-serif;
    }
    .btn-clear-date:hover { color: var(--danger); }
    .due-badge {
      font-size: 0.65rem; padding: 0.12rem 0.5rem; border-radius: 0.4rem; font-weight: 600;
      display: inline-flex; align-items: center; gap: 0.25rem;
    }
    .due-ok      { background: rgba(56,189,248,0.1);   color: var(--accent2); }
    .due-soon    { background: rgba(251,191,36,0.12);  color: #fbbf24; }
    .due-overdue { background: rgba(255,107,107,0.12); color: var(--danger); }
    .due-today   { background: rgba(244,114,182,0.12); color: var(--accent3); }

    @media (max-width: 500px) {
      .stats-row { gap: 0.5rem; }
      .add-row { flex-wrap: wrap; }
      .btn-add { width: 100%; justify-content: center; }
      .task-actions { opacity: 1; }
      .tasks-wrap { max-height: 350px; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- OFFLINE NOTICE -->
  <div class="offline-banner" id="offlineBanner">
    <i class="fas fa-wifi-slash"></i> You're offline — tasks saved locally
  </div>

  <!-- NOTIFICATION BANNER -->
  <div class="notif-banner" id="notifBanner">
    <span>🔔 فعّل <strong>التنبيهات</strong> عشان تتذكر مواعيد مهامك!</span>
    <button class="btn-notif" id="notifBtn">تفعيل</button>
    <button class="btn-dismiss" id="dismissNotif">✕</button>
  </div>

  <!-- INSTALL BANNER -->
  <div class="install-banner" id="installBanner">
    <span>📱 Install <strong>FlowTask</strong> on your home screen!</span>
    <button class="btn-install" id="installBtn">Install</button>
    <button class="btn-dismiss" id="dismissInstall">✕</button>
  </div>

  <div class="header">
    <div class="brand">
      <div class="brand-icon"><i class="fas fa-bolt"></i></div>
      <div class="brand-name">Flow<span class="brand-dot">.</span></div>
    </div>
    <div class="header-sub">Stay focused. Get it done.</div>
  </div>

  <div class="stats-row">
    <div class="stat-chip">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-chip">
      <div class="stat-num blue" id="statActive">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat-chip">
      <div class="stat-num accent" id="statDone">0</div>
      <div class="stat-label">Done</div>
    </div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
  </div>

  <div class="card">
    <div class="add-section">
      <div class="add-row">
        <div class="input-wrap">
          <input type="text" id="taskInput" placeholder="What needs to be done?" autocomplete="off">
          <i class="fas fa-plus"></i>
        </div>
        <button class="btn-add" id="addBtn" type="button">
          <i class="fas fa-arrow-up"></i> Add
        </button>
      </div>
      <div class="priority-row">
        <span class="priority-label">Priority:</span>
        <button class="priority-chip sel" data-p="low">Low</button>
        <button class="priority-chip" data-p="med">Med</button>
        <button class="priority-chip" data-p="high">High</button>
      </div>
      <div class="due-row">
        <span class="due-label"><i class="fas fa-calendar-alt"></i> Due:</span>
        <input type="date" id="dueDateInput">
        <button class="btn-clear-date" id="clearDateBtn">✕ Clear</button>
      </div>
    </div>

    <div class="filter-bar">
      <div class="filter-tabs">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="done">Done</button>
      </div>
      <div class="sort-clear">
        <button class="btn-sm" id="sortBtn"><i class="fas fa-arrow-up-wide-short"></i> Sort</button>
        <button class="btn-sm" id="clearBtn"><i class="fas fa-trash"></i> Clear done</button>
      </div>
    </div>

    <div class="tasks-wrap">
      <ul class="task-list" id="taskList"></ul>
    </div>

    <div class="footer">
      <span class="footer-hint"><i class="fas fa-database"></i> Auto-saved offline</span>
      <span class="footer-hint">
        <kbd class="kbd">↵</kbd> Add &nbsp;
        <kbd class="kbd">Dbl-click</kbd> Edit
      </span>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
// ── Notifications ────────────────────────────────────────
const notifBanner  = document.getElementById('notifBanner');
const notifBtn     = document.getElementById('notifBtn');
const dismissNotif = document.getElementById('dismissNotif');

function askNotifPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    notifBanner.classList.add('show');
  }
}

notifBtn.addEventListener('click', async () => {
  const perm = await Notification.requestPermission();
  notifBanner.classList.remove('show');
  if (perm === 'granted') {
    new Notification('FlowTask 🔔', {
      body: 'التنبيهات شغالة! هتتذكر مواعيد مهامك دايماً.',
      icon: 'icons/icon-192.png'
    });
    scheduleNotifications();
  }
});

dismissNotif.addEventListener('click', () => notifBanner.classList.remove('show'));

function sendNotification(title, body) {
  if (Notification.permission !== 'granted') return;
  new Notification(title, { body, icon: 'icons/icon-192.png', badge: 'icons/icon-192.png' });
}

function scheduleNotifications() {
  // Clear old intervals
  if (window._notifInterval) clearInterval(window._notifInterval);

  // Check every minute
  window._notifInterval = setInterval(() => {
    checkDueNotifications();
  }, 60 * 1000);

  checkDueNotifications();
}

function checkDueNotifications() {
  const stored = localStorage.getItem('flowtask_v2');
  if (!stored) return;
  let tasks = [];
  try { tasks = JSON.parse(stored); } catch(e) { return; }

  const today = new Date(); today.setHours(0,0,0,0);
  const notified = JSON.parse(localStorage.getItem('flowtask_notified') || '{}');

  tasks.filter(t => !t.done && t.due).forEach(t => {
    const dueD = new Date(t.due + 'T00:00:00');
    const diff  = Math.round((dueD - today) / 86400000);
    const key   = t.id + '_' + t.due;

    if (diff === 0 && !notified[key + '_today']) {
      sendNotification('⏰ مهمة النهارده!', `"${t.text}" — المهمة دي لازم تخلص النهارده!`);
      notified[key + '_today'] = true;
    } else if (diff === 1 && !notified[key + '_tomorrow']) {
      sendNotification('📅 مهمة بكره!', `"${t.text}" — موعدها بكره، متنساش!`);
      notified[key + '_tomorrow'] = true;
    } else if (diff < 0 && !notified[key + '_overdue']) {
      sendNotification('🚨 مهمة متأخرة!', `"${t.text}" — فات موعدها!`);
      notified[key + '_overdue'] = true;
    }
  });

  localStorage.setItem('flowtask_notified', JSON.stringify(notified));
}

// Daily reminder at 9am
function scheduleDailyReminder() {
  if (Notification.permission !== 'granted') return;
  const now   = new Date();
  const next9 = new Date();
  next9.setHours(9, 0, 0, 0);
  if (now >= next9) next9.setDate(next9.getDate() + 1);
  const delay = next9 - now;

  setTimeout(() => {
    const stored = localStorage.getItem('flowtask_v2');
    let tasks = [];
    try { tasks = JSON.parse(stored || '[]'); } catch(e) {}
    const pending = tasks.filter(t => !t.done).length;
    if (pending > 0) {
      sendNotification('☀️ صباح الخير!', `عندك ${pending} مهمة ناقصة النهارده.`);
    }
    scheduleDailyReminder(); // reschedule for next day
  }, delay);
}

// ── Register Service Worker ──────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// ── PWA Install Prompt ───────────────────────────────────
let deferredPrompt;
const installBanner = document.getElementById('installBanner');
const installBtn    = document.getElementById('installBtn');
const dismissBtn    = document.getElementById('dismissInstall');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBanner.classList.add('show');
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') toast('App installed! 🎉', 'fa-mobile-screen');
  deferredPrompt = null;
  installBanner.classList.remove('show');
});

dismissBtn.addEventListener('click', () => installBanner.classList.remove('show'));

// ── Offline Detection ────────────────────────────────────
const offlineBanner = document.getElementById('offlineBanner');
function updateOnlineStatus() {
  offlineBanner.classList.toggle('show', !navigator.onLine);
}
window.addEventListener('online',  updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// Ask for notification permission after 3 seconds
setTimeout(askNotifPermission, 3000);
if (Notification.permission === 'granted') {
  scheduleNotifications();
  scheduleDailyReminder();
}

// ── APP ──────────────────────────────────────────────────
(function() {
  let tasks = [];
  let filter = 'all';
  let priority = 'low';
  let sortMode = 'date';
  let dueDate = '';

  const PRIORITY_ORDER = { high: 0, med: 1, low: 2 };

  const taskInput    = document.getElementById('taskInput');
  const addBtn       = document.getElementById('addBtn');
  const taskList     = document.getElementById('taskList');
  const clearBtn     = document.getElementById('clearBtn');
  const sortBtn      = document.getElementById('sortBtn');
  const dueDateInput = document.getElementById('dueDateInput');
  const clearDateBtn = document.getElementById('clearDateBtn');
  const toastWrap   = document.getElementById('toastWrap');
  const statTotal   = document.getElementById('statTotal');
  const statActive  = document.getElementById('statActive');
  const statDone    = document.getElementById('statDone');
  const progressBar = document.getElementById('progressBar');

  const STORAGE_KEY = 'flowtask_v2';
  const BACKUP_KEY  = 'flowtask_backup';

  function load() {
    let loaded = false;

    // 1) Try primary localStorage
    try {
      const d = localStorage.getItem(STORAGE_KEY);
      if (d) {
        const parsed = JSON.parse(d);
        if (Array.isArray(parsed) && parsed.length > 0) {
          tasks = parsed;
          loaded = true;
        }
      }
    } catch(e) {}

    // 2) Fallback to backup key
    if (!loaded) {
      try {
        const b = localStorage.getItem(BACKUP_KEY);
        if (b) {
          const parsed = JSON.parse(b);
          if (Array.isArray(parsed) && parsed.length > 0) {
            tasks = parsed;
            loaded = true;
          }
        }
      } catch(e) {}
    }

    // 3) Try sessionStorage as last resort
    if (!loaded) {
      try {
        const s = sessionStorage.getItem(STORAGE_KEY);
        if (s) {
          const parsed = JSON.parse(s);
          if (Array.isArray(parsed) && parsed.length > 0) {
            tasks = parsed;
            loaded = true;
          }
        }
      } catch(e) {}
    }

    // 4) Only show demo tasks if truly first time (no data anywhere)
    if (!loaded) {
      tasks = [];
      // mark that we've initialized so we never show demo again
      try { localStorage.setItem('flowtask_init', '1'); } catch(e) {}
    }

    // validate
    tasks = tasks.filter(t => t && typeof t === 'object' && t.id && t.text);
  }

  function save() {
    const data = JSON.stringify(tasks);
    // Save to multiple places for redundancy
    try { localStorage.setItem(STORAGE_KEY, data); } catch(e) {}
    try { localStorage.setItem(BACKUP_KEY,  data); } catch(e) {}
    try { sessionStorage.setItem(STORAGE_KEY, data); } catch(e) {}
  }
  function uid()  { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

  function toast(msg, icon = 'fa-check') {
    const el = document.createElement('div');
    el.className = 'toast';
    el.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
    toastWrap.appendChild(el);
    setTimeout(() => {
      el.style.animation = 'toastOut 0.3s ease both';
      setTimeout(() => el.remove(), 300);
    }, 2200);
  }

  function updateStats() {
    const total  = tasks.length;
    const done   = tasks.filter(t => t.done).length;
    const active = total - done;
    statTotal.textContent  = total;
    statActive.textContent = active;
    statDone.textContent   = done;
    progressBar.style.width = (total === 0 ? 0 : Math.round((done/total)*100)) + '%';
  }

  function filtered() {
    let list = [...tasks];
    if (filter === 'active') list = list.filter(t => !t.done);
    if (filter === 'done')   list = list.filter(t =>  t.done);
    if (sortMode === 'priority') list.sort((a,b) => (PRIORITY_ORDER[a.priority]||2) - (PRIORITY_ORDER[b.priority]||2));
    else list.sort((a,b) => b.date - a.date);
    return list;
  }

  function render() {
    const list = filtered();
    taskList.innerHTML = '';
    if (list.length === 0) {
      taskList.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon"><i class="fas fa-inbox"></i></div>
          <h3>${filter === 'done' ? 'Nothing completed yet' : filter === 'active' ? 'All done! 🎉' : 'No tasks yet'}</h3>
          <p>${filter === 'all' ? 'Add your first task above' : ''}</p>
        </div>`;
      updateStats(); return;
    }
    list.forEach(task => taskList.appendChild(makeItem(task)));
    updateStats();
  }

  function makeItem(task) {
    const li = document.createElement('li');
    li.className = 'task-item' + (task.done ? ' done' : '');
    li.dataset.id = task.id;
    li.dataset.p  = task.priority;
    const d = new Date(task.date);
    const dateStr = d.toLocaleDateString('en', { month:'short', day:'numeric' });

    li.innerHTML = `
      <label class="check-wrap" title="${task.done ? 'Mark as active' : 'Mark as done'}">
        <input type="checkbox" ${task.done ? 'checked' : ''}>
        <div class="check-custom">
          <i class="fas fa-check"></i>
        </div>
      </label>
      <div class="task-body">
        <div class="task-text ${task.done ? 'done-text' : ''}">${escHtml(task.text)}</div>
        <div class="task-meta">
          <span class="task-date"><i class="fas fa-plus-circle"></i> ${dateStr}</span>
          <span class="task-badge badge-${task.priority}">${task.priority}</span>
          ${task.due ? dueBadge(task.due) : ''}
        </div>
      </div>
      <div class="task-actions">
        <button class="icon-btn edit" title="Edit"><i class="fas fa-pen"></i></button>
        <button class="icon-btn del"  title="Delete"><i class="fas fa-trash"></i></button>
      </div>`;

    li.querySelector('input[type=checkbox]').addEventListener('change', e => { e.stopPropagation();
      const t = tasks.find(x => x.id === task.id);
      if (t) { t.done = e.target.checked; save(); render(); toast(t.done ? 'Task completed!' : 'Marked active'); }
    });

    li.querySelector('.task-text').addEventListener('dblclick', () => startEdit(li, task.id));
    li.querySelector('.edit').addEventListener('click', () => startEdit(li, task.id));
    li.querySelector('.del').addEventListener('click', () => {
      tasks = tasks.filter(t => t.id !== task.id);
      save(); render(); toast('Task deleted', 'fa-trash');
    });

    return li;
  }

  function startEdit(li, id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    const orig = t.text;
    const textEl = li.querySelector('.task-text');
    const inp = document.createElement('input');
    inp.className = 'edit-input';
    inp.value = orig;
    textEl.replaceWith(inp);
    inp.focus();
    const commit = () => { const v = inp.value.trim(); if (v) { t.text = v.slice(0,120); save(); } render(); };
    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') inp.blur();
      if (e.key === 'Escape') { t.text = orig; render(); }
    });
  }

  function addTask() {
    const text = (taskInput.value || '').trim();
    if (!text) {
      taskInput.style.borderColor = 'rgba(255,107,107,0.5)';
      setTimeout(() => { taskInput.style.borderColor = ''; }, 1200);
      return;
    }
    const newTask = {
      id: uid(),
      text: text.slice(0, 120),
      done: false,
      priority: priority || 'low',
      date: Date.now(),
      due: dueDate || ''
    };
    tasks.unshift(newTask);
    save();
    taskInput.value = '';
    try { dueDateInput.value = ''; } catch(e) {}
    dueDate = '';
    if (filter === 'done') setFilter('all');
    render();
    toast('Task added!', 'fa-plus');
  }

  // ── Due Date helpers ──
  function dueBadge(due) {
    if (!due) return '';
    const today = new Date(); today.setHours(0,0,0,0);
    const dueD  = new Date(due + 'T00:00:00');
    const diff  = Math.round((dueD - today) / 86400000);
    if (diff < 0)  return `<span class="due-badge due-overdue"><i class="fas fa-circle-exclamation"></i> Overdue</span>`;
    if (diff === 0) return `<span class="due-badge due-today"><i class="fas fa-fire"></i> Today</span>`;
    if (diff <= 2) return `<span class="due-badge due-soon"><i class="fas fa-clock"></i> ${diff}d left</span>`;
    const fmt = new Date(due + 'T00:00:00').toLocaleDateString('en', { month:'short', day:'numeric' });
    return `<span class="due-badge due-ok"><i class="fas fa-calendar"></i> ${fmt}</span>`;
  }

  dueDateInput.addEventListener('change', () => { dueDate = dueDateInput.value; });
  clearDateBtn.addEventListener('click', () => { dueDate = ''; dueDateInput.value = ''; });

  document.querySelectorAll('.priority-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.priority-chip').forEach(b => b.classList.remove('sel'));
      btn.classList.add('sel');
      priority = btn.dataset.p;
    });
  });

  function setFilter(f) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
    render();
  }

  document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => setFilter(btn.dataset.filter)));

  sortBtn.addEventListener('click', () => {
    sortMode = sortMode === 'date' ? 'priority' : 'date';
    sortBtn.innerHTML = `<i class="fas fa-arrow-up-wide-short"></i> ${sortMode === 'priority' ? 'By priority' : 'By date'}`;
    render();
  });

  clearBtn.addEventListener('click', () => {
    const count = tasks.filter(t => t.done).length;
    if (!count) return;
    tasks = tasks.filter(t => !t.done);
    save(); render(); toast(`${count} task${count>1?'s':''} cleared`, 'fa-trash');
  });

  // Support both click and touch for APK WebView compatibility
  function bindTap(el, fn) {
    el.addEventListener('click', fn);
    el.addEventListener('touchend', function(e) {
      e.preventDefault();
      fn();
    }, { passive: false });
  }

  bindTap(addBtn, addTask);
  taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') { taskInput.blur(); addTask(); } });
  taskInput.addEventListener('keyup',   e => { if (e.key === 'Enter') addTask(); });

  // ── Save on close / switch app / hide ──
  window.addEventListener('beforeunload', save);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') save();
  });
  window.addEventListener('pagehide', save);

  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  load();
  render();
})();
</script>
</body>
